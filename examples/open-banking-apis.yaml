  ### VJ SDK
  /vja/{proxy+}:
    x-amazon-apigateway-any-method:
      tags:
        - "VJA"
      summary: "VJA booking ticket proxy"
      description: "Proxy all VJA flight booking ticket requests to the VJA booking Lambda function"
      parameters:
        - name: "proxy"
          in: "path"
          required: true
          description: "Proxied path for VJA booking ticket API"
          schema:
            type: "string"
      security:
        - cognito_non_prod_uat_vj_booking_ticket_authorizer:
            - "vja-booking/vja-booking-pre-login-user"
      responses:
        default:
          description: "Default response for VJA proxy"
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:ap-southeast-1:lambda:path/2015-03-31/functions/arn:aws:lambda:ap-southeast-1:587199685549:function:non-prod-uat-vja-booking-ticket/invocations"
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
        requestParameters:
          integration.request.path.proxy: "method.request.path.proxy"

