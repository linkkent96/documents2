openapi: "3.0.1"
info:
  title: "non-prod-uat-open-banking-apis"
  description: "Open Banking API Gateway (REST API)"
servers:
  - url: "https://open-banking.uat.galaxyfinx.cloud"
    variables:
      basePath:
        default: "uat"
    x-amazon-apigateway-endpoint-configuration:
      vpcEndpointIds:
        - "vpce-0422f6f89d1603e61"

tags:
  - name: "owner"
    x-amazon-apigateway-tag-value: "FinX"
  - name: "environment"
    x-amazon-apigateway-tag-value: "Uat"
  - name: "serverless"
    x-amazon-apigateway-tag-value: "True"
  - name: "application"
    x-amazon-apigateway-tag-value: "Workload-Nonprod"
  - name: "Authentication"
    description: "Partner authentication and token management"
  - name: "Victoria"
    description: "Victoria card prepaid management"
  - name: "SSMedia"
    description: "SSMedia bill inquiry and transaction management"
  - name: "HDI"
    description: "HDI insurance callback and certificate provisioning"
  - name: "VJA"
    description: "VJA flight booking ticket proxy"
  - name: "Genesys"
    description: "Genesys contact center customer lookup"
  - name: "HDSS"
    description: "HDSS onboarding, account management, and loan verification"
  - name: "Campaigns"
    description: "Campaign hooks and mission reward management"
  - name: "IC Base"
    description: "IC Base chat messaging and webhook integration"
  - name: "Insider"
    description: "Insider notification webhook integration"
  - name: "Mobifone"
    description: "Mobifone merchant account management"
  - name: "SKYFI"
    description: "SKYFI event callback integration"
  - name: "VNEID"
    description: "VNeID identity verification callbacks"

paths:
  /httpbin/get:
    get:
      tags:
        - "Health"
      summary: "Health check"
      description: "Connectivity check endpoint for the Open Banking API Gateway"
      responses:
        default:
          description: "httpbin check"
      x-amazon-apigateway-integration:
        connectionId: "3hgx20"
        httpMethod: "ANY"
        uri: "https://open-banking.uat.galaxyfinx.in/httpbin/get"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        type: "http_proxy"

  #authentication-service
  /api/v1/partners/auth:
    post:
      tags:
        - "Authentication"
      summary: "Partner login"
      description: "Authenticate a partner and retrieve an access token for Open Banking API access"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticationRequest"
      responses:
        default:
          description: "Partner login"
        "200":
          description: "Authentication successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticationResponse"
      x-amazon-apigateway-integration:
        connectionId: "3hgx20"
        httpMethod: "ANY"
        uri: "https://open-banking.uat.galaxyfinx.in/api/open-banking/v1/partners/auth"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        type: "http_proxy"

