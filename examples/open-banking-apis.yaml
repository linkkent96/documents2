  /api/open-banking/v1/ssmedia/bills/{lookupBy}/{lookupId}:
    get:
      tags:
        - "SSMedia"
      summary: "Get SSMedia transaction status"
      description: "Retrieve the status of an SSMedia bill transaction by lookup type and identifier"
      parameters:
        - name: "lookupBy"
          in: "path"
          required: true
          description: "The field to look up the transaction by (e.g. orderId, transactionId)"
          schema:
            type: "string"
        - name: "lookupId"
          in: "path"
          required: true
          description: "The value of the lookup field"
          schema:
            type: "string"
      security:
        - lambda_non_prod_uat_open_banking_authorizer: []
        - api_key: []
      responses:
        default:
          description: "Get SSMedia transaction status"
      x-amazon-apigateway-integration:
        connectionId: "3hgx20"
        httpMethod: "ANY"
        uri: "https://open-banking.uat.galaxyfinx.in/api/open-banking/v1/ssmedia/bills/{lookupBy}/{lookupId}"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        type: "http_proxy"
        requestParameters:
          "integration.request.header.X-Api-Key": "context.authorizer.X-Api-Key"
          "integration.request.path.lookupBy": "method.request.path.lookupBy"
          "integration.request.path.lookupId": "method.request.path.lookupId"

