  /api/open-banking/v1/victoria/sync-card-prepaid:
    post:
      tags:
        - "Victoria"
      summary: "Sync card prepaid"
      description: "Synchronize prepaid card data from Victoria to the GalaxyFinX platform"
      security:
        - lambda_non_prod_uat_open_banking_authorizer: []
        - api_key: []
      responses:
        default:
          description: "Sync card prepaid"
      x-amazon-apigateway-integration:
        connectionId: "3hgx20"
        httpMethod: "ANY"
